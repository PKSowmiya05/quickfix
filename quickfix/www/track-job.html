{% extends "templates/web.html" %}

{% block page_content %}

<div class="container mt-5">
    <h1>Track My Job</h1>

    <form method="GET">
        <div class="form-group">
            <label>Enter Job ID</label>
            <input type="text" name="job_id" class="form-control" placeholder="JOB-0001">
        </div>
        <br>
        <button type="submit" class="btn btn-primary">
            Track
        </button>
    </form>

    <hr>

    {% if job %}
        <h4>Status:</h4>
        <p><strong>{{ job.status }}</strong></p>

        <p>Job Card: {{ job.name }}</p>
        <p>Device: {{ job.device_name }}</p>
    {% elif frappe.form_dict.job_id %}
        <p class="text-danger">Job not found</p>
    {% endif %}

</div>

{% endblock %}
